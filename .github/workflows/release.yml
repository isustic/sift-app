name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build for Windows (.exe / .msi)'
        required: true
        type: boolean
        default: true
      build_macos:
        description: 'Build for macOS (.dmg / .app)'
        required: true
        type: boolean
        default: true
      build_linux:
        description: 'Build for Linux (.AppImage / .deb)'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: "windows"
            os: "windows-latest"
            target: "x86_64-pc-windows-msvc"
          # macOS (Apple Silicon)
          - platform: "macos"
            os: "macos-latest"
            target: "aarch64-apple-darwin"
          # Linux (x64)
          - platform: "linux"
            os: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.os }}

    # Skip the job if it's a manual run and the user unchecked this platform
    if: >-
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && (
        (matrix.platform == 'windows' && github.event.inputs.build_windows == 'true') ||
        (matrix.platform == 'macos' && github.event.inputs.build_macos == 'true') ||
        (matrix.platform == 'linux' && github.event.inputs.build_linux == 'true')
      ))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sift v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
